name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Ensure gh-pages branch exists
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:refs/remotes/origin/gh-pages
            exit 0
          fi

          worktree="$(mktemp -d)"
          git worktree add --detach "$worktree"
          (
            cd "$worktree"
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            touch .nojekyll
            git add .nojekyll
            git commit -m "chore: initialize gh-pages"
            git push origin gh-pages
          )
          git worktree remove "$worktree"
          git fetch origin gh-pages:refs/remotes/origin/gh-pages

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Copy Artifact Hub repo metadata to gh-pages
        run: |
          source_sha="$GITHUB_SHA"
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git show "$source_sha:artifacthub-repo.yml" > artifacthub-repo.yml
          git add artifacthub-repo.yml
          git diff --cached --quiet || git commit -m "chore: update artifacthub-repo.yml"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
