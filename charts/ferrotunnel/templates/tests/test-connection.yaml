apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ferrotunnel.fullname" . }}-test-health"
  labels:
    {{- include "ferrotunnel.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.11.1
      imagePullPolicy: IfNotPresent
      args:
        - --fail
        - --show-error
        - --silent
        - --max-time
        - "10"
        - http://{{ include "ferrotunnel.fullname" . }}-http:{{ .Values.service.http.port }}/health
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
