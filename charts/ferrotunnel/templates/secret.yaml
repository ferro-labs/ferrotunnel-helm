{{- if not .Values.auth.existingSecret -}}
{{- if and (not .Values.auth.token) (not .Values.auth.allowEmptyToken) -}}
{{- fail "auth.token is required when auth.existingSecret is not set. Prefer creating a Kubernetes Secret and setting auth.existingSecret." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ferrotunnel.tokenSecretName" . }}
  labels:
    {{- include "ferrotunnel.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{ .Values.auth.tokenKey | quote }}: {{ default "" .Values.auth.token | b64enc | quote }}
{{- end }}
